<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhiza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>Rhiza</h1>
    <div class="stats">
      <div class="stat"><span class="stat-num" id="stat-plants">—</span><span class="stat-label">Plants</span></div>
    </div>
  </div>
</header>
<div class="tabs-wrap">
  <div class="tabs-inner">
    <div class="tabs">
      <button class="tab active" data-tab="plants">Plants</button>
      <button class="tab" data-tab="map">Map</button>
      <button class="tab" data-tab="network">Network</button>
    </div>
    <div class="view-toggle" id="view-toggle">
      <button class="view-btn active" id="btn-grid" title="Card view" aria-label="Card view">
        <svg width="13" height="13" viewBox="0 0 15 15" fill="none">
          <rect x="1" y="1" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="8.5" y="1" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="1" y="8.5" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1" fill="currentColor"/>
        </svg>
      </button>
      <button class="view-btn" id="btn-list" title="List view" aria-label="List view">
        <svg width="13" height="13" viewBox="0 0 15 15" fill="none">
          <rect x="1" y="2.5" width="13" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="6.75" width="13" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="11" width="13" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>
</div>
<main>

  <!-- Plants tab -->
  <div id="tab-plants">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search" type="search" placeholder="Search plants…" autocomplete="off" />
      </div>
      <button class="filter-toggle" id="filter-toggle">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        <span id="filter-toggle-label">Filter</span>
      </button>
      <span class="count-label" id="count-label"></span>
    </div>
    <div id="filter-bar"></div>
    <div id="grid-view" class="card-grid"></div>
    <div id="list-view" class="table-wrap hidden">
      <table id="main-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
<!-- Map tab -->
<div id="tab-map" class="hidden">
  <div class="map-wrap">
    <canvas id="garden-canvas"></canvas>
    <div class="map-panel" id="map-panel">
      <div class="map-panel-empty" id="map-panel-empty">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <path d="M24 42 C24 42 24 22 24 16 C24 9 17 5 10 7 C17 9 22 16 24 22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M24 30 C24 30 24 22 29 17 C34 12 41 12 41 12 C41 12 36 19 29 23 C26.5 24.5 24 30 24 30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <p>Click a zone to explore</p>
      </div>
      <div class="map-panel-content hidden" id="map-panel-content">
        <div class="map-panel-header">
          <span class="map-panel-zone-name" id="map-panel-name"></span>
        </div>
        <div class="map-panel-props" id="map-panel-props"></div>
        <div class="map-panel-plants-label">Plants in this zone</div>
        <div class="map-plant-list" id="map-plant-list"></div>
      </div>
    </div>
  </div>
</div>

  <!-- Network tab -->
<div id="tab-network" class="hidden">
  <div class="net-wrap">
    <div class="net-sidebar">
      <div class="net-sidebar-label">Zone</div>
      <div id="net-zone-filters"></div>
      <div class="net-sidebar-label" style="margin-top:12px">Type</div>
      <div id="net-type-filters"></div>
      <div class="net-sidebar-label" style="margin-top:12px">Legend</div>
      <div id="net-legend"></div>
      <div class="net-sel-box" id="net-sel-box">
        <div class="net-sidebar-label">Selection</div>
        <div class="net-sel-name" id="net-sel-name"></div>
        <div class="net-sel-meta" id="net-sel-meta"></div>
      </div>
    </div>
    <div class="net-canvas-wrap">
      <div id="net-cy"></div>
      <div class="net-card" id="net-card">
        <button class="net-card-close" id="net-card-close">✕</button>
        <div class="net-card-name" id="net-card-name"></div>
        <div class="net-card-type" id="net-card-type"></div>
        <div class="net-card-divider"></div>
        <div id="net-card-rows"></div>
      </div>
      <button id="net-reset-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Reset
      </button>
    </div>
  </div>
</div>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
<script src="map.js"></script>
<script src="network.js"></script>
</body>
</html>
